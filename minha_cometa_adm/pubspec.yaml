name: minha_cometa_adm
description: Aplicativo de administração de vendas da Cometa
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.0.5
  http: ^0.13.6
  shared_preferences: ^2.2.2
  local_auth: ^2.1.7
  cupertino_icons: ^1.0.2
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.4
  url_launcher: ^6.2.1
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  flutter_native_splash: ^2.3.4
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/splash_logo.png
    - assets/images/splash_logo2.png
    - assets/images/loja.png
    - assets/images/relatorio.png
    - assets/images/notificacoes.png
    - assets/images/config.png
    - assets/images/alterar_limite.png
    - assets/icons/app_icon.png
    - assets/icons/clientes.png
    - assets/icons/vendas.png
    - assets/icons/indeniza.png
    - assets/icons/titulos.png
    - assets/icons/vendedores.png
    - assets/icons/limites.png
    - assets/icons/inadimplencia.png
    - assets/icons/usuarios.png
    - assets/icons/despesas.png
    - assets/icons/compras.png
    - assets/icons/estoque.png
    - assets/icons/inventario.png
    - assets/icons/aprovacoes.png
    - assets/icons/pagamentos.png
    - assets/icons/pdv.png
    - assets/icons/desconto.png

# Configuração dos ícones do aplicativo
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 21

# Configuração da splash screen
flutter_native_splash:
  color: "#ffffff"
  branding_mode: bottom
  color_dark: "#000000"
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  android_screen_orientation: portrait
